<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geoportal — São José do Calçado</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Estilos do Geoportal -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- ── Cabeçalho ─────────────────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-logo">🗺</div>
    <div>
      <div class="header-title">Geoportal de São José do Calçado</div>
      <div class="header-subtitle">Espírito Santo · Dados Vetoriais</div>
    </div>
  </header>

  <!-- ── Corpo ─────────────────────────────────────────────────────────────── -->
  <div id="body">

    <!-- Painel lateral -->
    <aside id="sidebar">
      <div id="sidebar-header">Camadas</div>

      <!-- Busca global -->
      <div id="search-box">
        <div id="search-input-wrap">
          <svg id="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="search-input" placeholder="Pesquisar no Geoportal..." autocomplete="off" spellcheck="false" />
          <button class="search-clear-btn" title="Limpar busca">✕</button>
        </div>
        <div id="search-results"></div>
      </div>

      <!-- Lista de camadas (preenchida por map.js) -->
      <div id="layer-list"></div>

      <!-- Seletor de mapa base -->
      <div id="basemap-panel">
        <div class="basemap-title">Mapa Base</div>
        <label class="basemap-option">
          <input type="radio" name="basemap" value="OpenStreetMap" checked />
          OpenStreetMap
        </label>
        <label class="basemap-option">
          <input type="radio" name="basemap" value="Esri World Imagery" />
          Esri World Imagery
        </label>
      </div>
    </aside>

    <!-- Mapa -->
    <div id="map"></div>

  </div><!-- /#body -->

  <!-- ── Barra de status ────────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span class="status-label">Coordenadas</span>
    <span id="coords">Lat: —  Lon: —</span>
  </div>

</div><!-- /#app -->

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Dados GeoJSON embutidos (gerado por gerar_dados.ps1) -->
<script src="js/geodata.js"></script>

<!-- Configuração das camadas -->
<script src="js/config.js"></script>

<!-- Estatísticas MapBiomas por imóvel CAR (pré-processado) -->
<script src="js/geodata_car_mapbiomas.js"></script>

<!-- Lógica do mapa -->
<script src="js/map.js"></script>

</body>
</html>
